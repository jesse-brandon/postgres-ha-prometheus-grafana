services:
  pg-primary:
    image: postgres:15
    container_name: pg-primary
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: appdb
    volumes:
      - pg_primary_data:/var/lib/postgresql/data
      - ./postgres/primary/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./postgres/primary/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./postgres/primary/pg_hba.conf:/etc/postgresql/pg_hba.conf
      - ./postgres/wal-archive:/wal-archive
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
    ports:
      - "5432:5432"

  pg-replica:
    image: postgres:15
    container_name: pg-replica
    restart: unless-stopped
    depends_on:
      - pg-primary
    environment:
      PGPASSWORD: admin
    volumes:
      - pg_replica_data:/var/lib/postgresql/data
      - ./postgres/replica/setup-replica.sh:/setup-replica.sh
      - ./postgres/primary/pg_hba.conf:/etc/postgresql/pg_hba.conf
      - ./postgres/wal-archive:/wal-archive
    entrypoint: ["/bin/bash", "/setup-replica.sh"]
    ports:
      - "5433:5432"

  pgbouncer:
    image: edoburu/pgbouncer
    container_name: pgbouncer
    restart: unless-stopped
    depends_on:
      - pg-primary
    ports:
      - "6432:6432"
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter
    container_name: postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://admin:admin@pgbouncer:6432/postgres?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - pgbouncer

  pgbouncer-exporter:
    image: prometheuscommunity/pgbouncer-exporter
    container_name: pgbouncer-exporter
    restart: unless-stopped
    depends_on:
      - pgbouncer
    command:
      - "--pgBouncer.connectionString=postgres://admin:admin@pgbouncer:6432/pgbouncer?sslmode=disable"
    ports:
      - "9127:9127"

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - pg-primary
      - pgbouncer
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json


volumes:
  pg_primary_data:
  pg_replica_data: