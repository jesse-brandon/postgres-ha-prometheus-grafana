[databases]
* = host=pg-primary port=5432

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

pool_mode = transaction
max_client_conn = 100
default_pool_size = 20

ignore_startup_parameters = extra_float_digits

log_connections = 1
log_disconnections = 1
stats_users = admin